# generated by: yake code goreleaser
version: 2
before:
  hooks:
    - go mod tidy
builds:
  - id: apt-github
    binary: github
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
nfpms:
  - id: apt-github
    package_name: apt-github
    ids:
      - apt-github
    bindir: /usr/lib/apt/methods
    maintainer: vitalvas
    vendor: vitalvas
    homepage: https://github.com/vitalvas/apt-github
    description: APT transport method for GitHub releases
    license: MIT
    formats:
      - deb
    dependencies:
      - gnupg
    scripts:
      postinstall: misc/postinstall.sh
checksum:
  name_template: checksums.txt
  algorithm: sha256
snapshot:
  version_template: '{{ .Version }}-{{ .CommitTimestamp }}-{{ .ShortCommit }}'
changelog:
  disable: true
release:
  github:
    owner: vitalvas
    name: apt-github
  draft: false
  prerelease: auto
  mode: keep-existing
